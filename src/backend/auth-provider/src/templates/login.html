<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f4f6f9;
            font-family: Arial, Helvetica, sans-serif;
        }

        .login-container {
            width: 100%;
            max-width: 400px;
            background: white;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            margin-bottom: 24px;
            color: #222;
        }

        .form-group {
            margin-bottom: 16px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdcdc;
            border-radius: 8px;
            font-size: 14px;
        }

        input:focus {
            outline: none;
            border-color: #2563eb;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #2563eb;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .error {
            display: none;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #fee2e2;
            color: #b91c1c;
            border: 1px solid #fecaca;
        }

        .success {
            display: none;
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 8px;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }
    </style>
</head>
<body>

<div class="login-container">
    <h1>Sign In</h1>

    <div id="error-message" class="error"></div>
    <div id="success-message" class="success"></div>

    <form id="login-form">
        <div class="form-group">
            <input
                type="email"
                name="email"
                placeholder="Email"
                required
            >
        </div>

        <div class="form-group">
            <input
                type="password"
                name="password"
                placeholder="Password"
                required
            >
        </div>

        <input
            type="hidden"
            name="redirect_uri"
            value="{{ redirect_uri }}"
        >

        <button type="submit" id="submit-btn">
            Login
        </button>
    </form>
</div>

<script>
    const form = document.getElementById("login-form");
    const errorBox = document.getElementById("error-message");
    const successBox = document.getElementById("success-message");
    const submitBtn = document.getElementById("submit-btn");

    form.addEventListener("submit", async (e) => {
        e.preventDefault();

        errorBox.style.display = "none";
        successBox.style.display = "none";

        submitBtn.disabled = true;
        submitBtn.textContent = "Logging in...";

        try {
            const formData = new FormData(form);

            const response = await fetch("/login", {
                method: "POST",
                body: formData
            });

            const data = await response.json();

            if (!response.ok) {
                errorBox.textContent = data.detail || "Login failed"; 
                //raise HttpException => su dung data.detail de co the nhan duoc log loi 
                errorBox.style.display = "block";
                return;
            }

            successBox.textContent = "Login successful";
            successBox.style.display = "block";

            if (data.redirect_uri) {
                window.location.href = data.redirect_uri;
            }

        } catch (error) {
            errorBox.textContent = "Unable to connect to server";
            errorBox.style.display = "block";
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = "Login";
        }
    });
</script>

</body>
</html>
